<!DOCTYPE html>
<html>
<head>
    <title>Azure Blob Storage App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Azure Cloud File Storage Manager</h2>
     <form action="/upload" method="POST" enctype="multipart/form-data" class="mb-4">
        <input type="file" name="file" class="form-control mb-2" required>
        <button type="submit" class="btn btn-primary">Upload</button>
    </form>

    <h4>Uploaded Files</h4>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Filename</th>
                <th>Actions</th>
            </tr>
        </thead>
         <tbody>
            {% for file in files %}
            <tr>
                <td>{{ file }}</td>
                <td>
                    <a href="/download/{{ file }}" class="btn btn-success btn-sm">Download</a>
                    <a href="/delete/{{ file }}" class="btn btn-danger btn-sm">Delete</a>
                    <a href="/generate-link/{{ file }}" class="btn btn-warning btn-sm">Secure Link</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </body>
</html>
