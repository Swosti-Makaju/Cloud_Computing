<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Cloud File Storage</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #e0ecff, #f4f7ff);
            min-height: 100vh;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title {
            font-weight: 700;
            color: #6e8bb6;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #0d6efd;
            border-radius: 15px;
            padding: 30px;
            background: #f8fbff;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #eef5ff;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 8px 18px;
            font-weight: 500;
        }

        table {
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .file-icon {
            color: #0d6efd;
            margin-right: 8px;
        }

        .action-btns a {
            margin-right: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="main-card">

        <!-- Heading -->
        <div class="text-center mb-4">
            <h1 class="title">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                Azure Cloud File Storage
            </h1>

            <p class="subtitle">
                Upload, manage, and securely share your files using Azure Blob Storage
            </p>
        </div>

        <!-- Upload Form -->
        <div class="upload-box mb-5">

            <form action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Select File
                    </label>

                    <input type="file"
                           name="file"
                           class="form-control form-control-lg"
                           required>
                </div>

                <button type="submit"
                        class="btn btn-primary btn-custom">
                    <i class="bi bi-upload"></i>
                    Upload File
                </button>

            </form>

        </div>

        <!-- File Table -->
        <h4 class="mb-3 fw-bold">
            <i class="bi bi-folder2-open"></i>
            Uploaded Files
        </h4>

        <div class="table-responsive">

            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>Filename</th>
                        <th width="320">Actions</th>
                    </tr>
                </thead>

                <tbody>

                    {% for file in files %}

                    <tr>

                        <td>
                            <i class="bi bi-file-earmark-text file-icon"></i>
                            {{ file }}
                        </td>

                        <td class="action-btns">

                            <a href="/download/{{ file }}"
                               class="btn btn-success btn-sm btn-custom">
                                <i class="bi bi-download"></i>
                                Download
                            </a>

                            <a href="/delete/{{ file }}"
                               class="btn btn-danger btn-sm btn-custom">
                                <i class="bi bi-trash"></i>
                                Delete
                            </a>

                            <a href="/generate-link/{{ file }}"
                               class="btn btn-warning btn-sm btn-custom">
                                <i class="bi bi-link-45deg"></i>
                                Secure Link
                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        <!-- Footer -->
        <div class="footer">
            Built with Flask & Azure Blob Storage
        </div>

    </div>

</div>

</body>
</html>
